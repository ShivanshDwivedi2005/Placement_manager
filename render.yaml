services:
  - type: web
    name: internship-manager-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: DB_POOL_MIN_SIZE
        value: "1"
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: DB_POOL_TIMEOUT
        value: "15"
      - key: GZIP_MINIMUM_SIZE
        value: "500"
